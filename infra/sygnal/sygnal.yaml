# Sygnal push gateway config. Dev placeholder — replace api_key + APNs cert.
# Docs: https://github.com/matrix-org/sygnal
http:
  # Local only — reached by Synapse on the same host, not exposed publicly.
  bind_addresses: ['127.0.0.1']
  port: 5000

log:
  setup:
    version: 1
    formatters:
      normal:
        format: "%(asctime)s [%(process)d] %(levelname)-5s %(name)s %(message)s"
    handlers:
      stdout:
        class: logging.StreamHandler
        formatter: normal
        stream: ext://sys.stdout
    loggers:
      sygnal:
        propagate: false
        handlers: [stdout]
    root:
      level: INFO
      handlers: [stdout]
  access:
    x_forwarded_for: false

metrics:
  prometheus:
    enabled: false

apps:
  # Android — FCM v1. Legacy `api_key` was shut down by Google in 2024.
  app.majoin.android:
    type: gcm
    api_version: v1
    project_id: REPLACE_WITH_FIREBASE_PROJECT_ID
    service_account_file: /opt/sygnal/keys/fcm-service-account.json

  # iOS — APNs .p12 cert at the path below. Uncomment once the cert exists.
  # app.majoin.ios:
  #   type: apns
  #   certfile: /opt/sygnal/keys/apns.p12
  #   # sandbox = development-signed builds; production for App Store/TestFlight.
  #   platform: sandbox
  #   topic: app.majoin
