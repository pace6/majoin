name: majoin

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ./synapse/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 5s
      retries: 10

  synapse:
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: localhost
      SYNAPSE_REPORT_STATS: "no"
      UID: "991"
      GID: "991"
    volumes:
      - ./synapse/data:/data
    ports:
      - "8008:8008"

  sygnal:
    image: matrixdotorg/sygnal:latest
    restart: unless-stopped
    volumes:
      - ./sygnal/sygnal.yaml:/sygnal/sygnal.yaml:ro
      - ./sygnal/keys:/sygnal/keys:ro
    ports:
      - "5000:5000"

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
    command: ["-c", "/etc/turnserver.conf"]

  # LiveKit SFU — media routing for group calls (MatrixRTC).
  # host networking so the RTC UDP port range maps directly.
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    command: ["--config", "/etc/livekit.yaml"]

  # lk-jwt-service — exchanges a Matrix OpenID token for a LiveKit JWT.
  # The client hits this at /sfu/get; it must share LIVEKIT_KEY/SECRET with
  # livekit/livekit.yaml.
  lk-jwt-service:
    image: ghcr.io/element-hq/lk-jwt-service:latest
    restart: unless-stopped
    environment:
      LIVEKIT_URL: "wss://livekit.tokens2.io"
      LIVEKIT_KEY: "REPLACE_WITH_LIVEKIT_API_KEY"
      LIVEKIT_SECRET: "REPLACE_WITH_LIVEKIT_API_SECRET"
      LK_JWT_PORT: "8080"
    ports:
      - "8080:8080"
