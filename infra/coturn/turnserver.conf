# coturn config — Matrix VoIP TURN for majoin (production).
# Reference for /etc/turnserver.conf on the VPS. Long-term auth secret shared
# with Synapse so clients get short-lived credentials via /voip/turnServer.

listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=49252

# Must match Synapse `turn_shared_secret` in homeserver.yaml.
use-auth-secret
static-auth-secret=CHANGE_ME_TURN_SECRET

realm=chat.tokens2.io

# Logging
syslog
simple-log

# Disable insecure protocols
no-tcp-relay
no-multicast-peers
no-tlsv1
no-tlsv1_1

stale-nonce
