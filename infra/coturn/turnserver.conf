# coturn dev config — Matrix VoIP TURN.
# Host networking so STUN/TURN ports map directly. Switch to long-term auth
# secret shared with Synapse so clients get short-lived credentials via the
# /voip/turnServer endpoint.

listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=49252

# Dev secret — change for prod. Must match Synapse `turn_shared_secret`.
use-auth-secret
static-auth-secret=majoin-dev-turn-secret-change-me

realm=majoin.local

# Logging
verbose
log-file=stdout
no-stdout-log
simple-log

# Disable insecure protocols
no-tcp-relay
no-multicast-peers
no-tlsv1
no-tlsv1_1

# Dev: relay loopback so localhost works
allow-loopback-peers
total-quota=100
bps-capacity=0
stale-nonce
