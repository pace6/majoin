name: majoin
description: "Majoin — Line-style chat over Matrix."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Matrix client (Famedly Dart SDK).
  matrix: ^7.1.2

  # Storage / state.
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4

  # Routing / state.
  go_router: ^16.2.0
  provider: ^6.1.5

  # Media / pickers.
  image_picker: ^1.1.2
  file_picker: ^10.2.0
  cached_network_image: ^3.4.1

  # Native bits.
  flutter_local_notifications: ^19.4.2

  # Push (FCM via sygnal). Needs google-services.json / GoogleService-Info.plist
  # to actually deliver — see docs/push-setup.md. Absent config degrades to
  # local-only notifications at runtime.
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # UI helpers.
  flutter_adaptive_scaffold: ^0.3.3
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.3.7+1
  path: ^1.9.1
  flutter_webrtc: ^1.4.1
  permission_handler: ^12.0.1
  webrtc_interface: ^1.5.1
  record: ^6.2.0
  just_audio: ^0.10.5
  video_player: ^2.11.1
  http: ^1.6.0
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.10+1
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# path_provider_foundation 2.5.0+ migrated to the objective_c FFI package,
# whose objective_c.framework fails to embed into the iOS Simulator build
# (incremental builds drop it -> "Couldn't resolve DOBJC_initializeApi" white
# screen). Pin to the last pre-objective_c release.
dependency_overrides:
  path_provider_foundation: 2.4.1

flutter:
  uses-material-design: true
  assets:
    # majoin_v1 is bundled as the offline default pack.
    # animals/food packs ship via the sticker API (uploaded to Synapse).
    - assets/stickers/majoin_v1/
