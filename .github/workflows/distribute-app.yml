name: Distribute app

# Builds the Flutter client and ships it to Firebase App Distribution.
# Android always runs; iOS runs only when the Apple signing secrets exist.
# Setup + required secrets: docs/app-distribution.md
#
# Trigger: push a tag like `app-v0.1.0`, or run manually.

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Release notes for testers'
        required: false
        default: 'Manual build'
  push:
    tags: ['app-v*']

concurrency:
  group: distribute-app
  cancel-in-progress: false

env:
  # Tester group configured in the Firebase console.
  FIREBASE_GROUPS: testers

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Write release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ env.FIREBASE_GROUPS }}
          file: client/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: ${{ github.event.inputs.notes || github.ref_name }}

  ios:
    # macos-15 ships Xcode 16, which is required by recent Flutter plugins
    # (e.g. camera_avfoundation uses iOS 18 SDK symbols like
    # AVCaptureSession.wasInterruptedNotification).
    runs-on: macos-15
    # iOS needs an Apple Developer account + signing material. Gated by the
    # IOS_ENABLED repo variable so the job stays off until secrets are set.
    if: ${{ vars.IOS_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile + extract metadata
        id: profile
        run: |
          PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES"
          RAW=$(mktemp)
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > "$RAW"
          PLIST=$(mktemp)
          security cms -D -i "$RAW" > "$PLIST"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PLIST")
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PLIST")
          cp "$RAW" "$PROFILES/$UUID.mobileprovision"
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Force manual signing for archive
        run: |
          cat >> ios/Flutter/Release.xcconfig <<EOF

          // Injected by CI for manual signing — overrides project-level
          // "iPhone Developer" identity and Automatic signing style.
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = ${{ steps.profile.outputs.name }}
          DEVELOPMENT_TEAM = ${{ secrets.APPLE_TEAM_ID }}
          EOF

      - name: Write ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>ad-hoc</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>compileBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.majoin.majoin2</key>
              <string>${{ steps.profile.outputs.name }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build release IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Locate IPA
        id: ipa
        run: echo "path=$(ls build/ios/ipa/*.ipa | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ env.FIREBASE_GROUPS }}
          file: client/${{ steps.ipa.outputs.path }}
          releaseNotes: ${{ github.event.inputs.notes || github.ref_name }}
